aid: polly
name: Polly
description: >-
  Polly is a .NET resilience and transient-fault-handling library that allows
  developers to express resilience strategies such as Retry, Circuit Breaker,
  Hedging, Timeout, Rate Limiter, and Fallback in a fluent and thread-safe
  manner. A .NET Foundation member project.
